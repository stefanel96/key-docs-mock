<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Document</title>
<style>
html, body { width: 100%; overflow-x: hidden; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #2b2b2b; margin-left: -15px; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); padding: 32px; max-width: 480px; width: 100%; }
.card h2 { font-size: 20px; color: #33475b; margin-bottom: 4px; }
.card .sub { font-size: 14px; color: #7c98b6; margin-bottom: 24px; }
.drop-zone { border: 2px dashed #cbd6e2; border-radius: 6px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
.drop-zone:hover { border-color: #0091ae; background: #f0fafc; }
.drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone .label { font-size: 14px; color: #516f90; }
.drop-zone .hint { font-size: 12px; color: #99acc2; margin-top: 4px; }
.file-info { margin-top: 16px; padding: 12px; background: #f5f8fa; border-radius: 4px; display: none; align-items: center; justify-content: space-between; }
.file-info .name { font-size: 14px; color: #33475b; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
.file-info .size { font-size: 12px; color: #7c98b6; }
.file-info .remove { background: none; border: none; color: #f2545b; cursor: pointer; font-size: 18px; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; }
.btn-primary { background: #ff7a59; color: #fff; }
.btn-primary:hover { background: #ff5c35; }
.btn-primary:disabled { background: #cbd6e2; cursor: not-allowed; }
.progress { margin-top: 16px; display: none; }
.progress-bar { height: 4px; background: #eaf0f6; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #00bda5; width: 0%; transition: width 0.4s; }
.progress-text { font-size: 12px; color: #7c98b6; margin-top: 6px; text-align: center; }
.status { margin-top: 16px; padding: 12px; border-radius: 4px; font-size: 14px; display: none; }
.status.success { background: #e5f8f3; color: #00856a; display: block; }
input[type=file] { display: none; }
</style>
</head>
<body>
<div class="card">
  <h2>Upload Document</h2>
  <p class="sub" id="subtitle">Upload a file to this record. It will be classified automatically.</p>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()">
    <div class="icon">📄</div>
    <div class="label">Drop a file here or click to browse</div>
    <div class="hint">PDF, DOCX, XLSX, PPTX — max 10 MB</div>
  </div>
  <input type="file" id="fi" accept=".pdf,.docx,.doc,.xlsx,.xls,.pptx,.ppt,.txt,.csv">
  <div class="file-info" id="fileInfo">
    <div><div class="name" id="fn"></div><div class="size" id="fs"></div></div>
    <button class="remove" onclick="clearFile()">&times;</button>
  </div>
  <button class="btn btn-primary" id="uploadBtn" onclick="doUpload()" disabled>Upload</button>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
    <div class="progress-text" id="pt">Uploading...</div>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const recordType = params.get('recordType') || 'Record';
document.getElementById('subtitle').textContent = 'Upload a file to this ' + recordType + ' record. It will be classified automatically.';

let file = null;
const fi = document.getElementById('fi');
const dz = document.getElementById('dropZone');

fi.addEventListener('change', e => { if(e.target.files[0]) pickFile(e.target.files[0]); });
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#0091ae'; dz.style.background='#f0fafc'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor='#cbd6e2'; dz.style.background=''; });
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor='#cbd6e2'; dz.style.background=''; if(e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]); });

function pickFile(f) {
  if (f.size > 10*1024*1024) { alert('File too large. Maximum 10 MB.'); return; }
  file = f;
  document.getElementById('fn').textContent = f.name;
  document.getElementById('fs').textContent = (f.size < 1024*1024) ? (f.size/1024).toFixed(1)+' KB' : (f.size/(1024*1024)).toFixed(1)+' MB';
  document.getElementById('fileInfo').style.display = 'flex';
  dz.style.display = 'none';
  document.getElementById('uploadBtn').disabled = false;
  document.getElementById('status').style.display = 'none';
}

function clearFile() {
  file = null; fi.value = '';
  document.getElementById('fileInfo').style.display = 'none';
  dz.style.display = '';
  document.getElementById('uploadBtn').disabled = true;
}

function doUpload() {
  if (!file) return;
  document.getElementById('uploadBtn').disabled = true;
  const prog = document.getElementById('progress');
  const pf = document.getElementById('pf');
  const pt = document.getElementById('pt');
  prog.style.display = 'block';
  pf.style.width = '0%';
  pt.textContent = 'Uploading...';
  setTimeout(() => { pf.style.width = '40%'; }, 300);
  setTimeout(() => { pf.style.width = '70%'; pt.textContent = 'Processing...'; }, 1000);
  setTimeout(() => { pf.style.width = '90%'; pt.textContent = 'Classifying with AI...'; }, 1800);
  setTimeout(() => {
    pf.style.width = '100%'; pt.textContent = 'Done!';
    const st = document.getElementById('status');
    st.textContent = '\u2705 Document uploaded and queued for classification.';
    st.className = 'status success';
  }, 2500);
  setTimeout(() => {
    window.top.postMessage(JSON.stringify({action:'DONE'}), '*');
  }, 4000);
}
</script>
</body>
</html>
